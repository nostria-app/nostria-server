db = "/var/lib/strfry/db"

dbParams {
    maxreaders = 256
    mapsize = 10995116277760
    noReadAhead = false
}

events {
    maxEventSize = 65536
    rejectEventsNewerThanSeconds = 900
    rejectEventsOlderThanSeconds = 94608000
    rejectEphemeralEventsOlderThanSeconds = 60
    ephemeralEventsLifetimeSeconds = 300
    maxNumTags = 2000
    maxTagValSize = 1024
}

relay {
    bind = "0.0.0.0"
    port = 7777
    nofiles = 500000
    realIpHeader = ""

    auth {
        enabled = true
        serviceUrl = "wss://indexer.openresist.com"
    }

    info {
        name = "OpenResist Discovery Relay"
        description = "A dedicated discovery relay for OpenResist, built on strfry and synchronized with external discovery sources for relay and contact-list discovery."
        pubkey = "d1bd33333733dcc411f0ee893b38b8522fc0de227fff459d99044ced9e65581b"
        contact = "https://openresist.com"
        icon = ""
        banner = ""
        privacy = ""
        terms = ""
        nips = "[65]"
    }

    maxWebsocketPayloadSize = 131072
    maxReqFilterSize = 200
    autoPingSeconds = 55
    enableTcpKeepalive = true
    queryTimesliceBudgetMicroseconds = 10000
    maxFilterLimit = 5000
    maxFilterLimitCount = 1000000
    maxSubsPerConnection = 200

    writePolicy {
        plugin = ""
        timeoutSeconds = 10
    }

    compression {
        enabled = false
        slidingWindow = false
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
        invalidEvents = true
    }

    numThreads {
        ingester = 3
        reqWorker = 3
        reqMonitor = 3
        negentropy = 2
    }

    negentropy {
        enabled = true
        maxSyncEvents = 1000000
    }

    filterValidation {
        enabled = false
        maxFiltersPerReq = 3
        minFiltersPerReq = 1
        maxKindsPerFilter = 3
        allowedKinds = ""
        requireAuthorOrTag = false
    }
}