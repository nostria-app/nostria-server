db = "/var/lib/strfry/db"

dbParams {
    maxreaders = 256
    mapsize = 10995116277760
    noReadAhead = false
}

events {
    maxEventSize = 524288
    rejectEventsNewerThanSeconds = 900
    rejectEventsOlderThanSeconds = 94608000
    rejectEphemeralEventsOlderThanSeconds = 60
    ephemeralEventsLifetimeSeconds = 300
    maxNumTags = 5000
    maxTagValSize = 1024
}

relay {
    bind = "0.0.0.0"
    port = 7777
    nofiles = 500000
    realIpHeader = ""

    info {
        name = "OpenResist Relay"
        description = "An OpenResist account relay built on strfry for durable storage of Nostr account and application events. This local server replaces the previous split relay topology and is intended to sync with ribo.us.nostria.app and ribo.eu.nostria.app."
        pubkey = "d1bd33333733dcc411f0ee893b38b8522fc0de227fff459d99044ced9e65581b"
        contact = "https://openresist.com"
        icon = ""
        banner = ""
        privacy = ""
        terms = ""
        software = "git+https://github.com/hoytech/strfry.git"
        version = "1.1.0"
        supported_nips = [1, 2, 4, 9, 11, 15, 16, 20, 22, 28, 33, 40, 42, 45, 65]

        limitation {
            max_ws_frame_size = 131072
            max_connections = 1000
            max_subscriptions = 200
            max_filters = 100
            max_limit = 5000
            max_subid_length = 64
            max_event_tags = 5000
            max_content_length = 524288
            min_pow_difficulty = 0
            auth_required = false
            payment_required = false
            restricted_writes = false
        }

        posting_policy = "https://www.openresist.com/policy"

        fees {
            admission = []
            subscription = []
            publication = []
        }
    }

    maxWebsocketConnections = 1000
    maxWebsocketSendBufferSize = 262144

    compression {
        enabled = false
        slidingWindow = false
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
        invalidEvents = true
    }

    numThreads {
        ingester = 3
        reqWorker = 3
        reqMonitor = 3
        negentropy = 2
    }

    negentropy {
        enabled = true
        maxSyncEvents = 1000000
    }

    filterValidation {
        enabled = false
        maxFiltersPerReq = 3
        minFiltersPerReq = 1
        maxKindsPerFilter = 10
        allowedKinds = ""
        requireAuthorOrTag = false
    }
}